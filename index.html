<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Red Hat Title Simulator - Framework v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;700&family=Red+Hat+Text:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --rh-red: #EE0000; --rh-black: #000000; --rh-grey: #f0f0f0; }
        body { font-family: 'Red Hat Text', sans-serif; background: var(--rh-grey); padding: 0; margin: 0; color: var(--rh-black); }
        .hero-banner { background-color: white; padding: 40px 60px; border-bottom: 4px solid var(--rh-red); display: flex; align-items: center; justify-content: space-between; }
        .hero-text h1 { font-family: 'Red Hat Display'; font-size: 2.2rem; margin: 0; }
        .main-content { padding: 40px 60px; }
        .container { display: flex; gap: 20px; max-width: 1400px; margin-bottom: 40px; }
        .column { flex: 1; background: white; padding: 25px; border-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 4px solid #ddd; }
        h2 { font-family: 'Red Hat Display'; font-size: 0.9rem; border-bottom: 1px solid #eee; padding-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .option-item { display: flex; align-items: center; padding: 10px; border: 1px solid #eee; margin-bottom: 8px; cursor: pointer; font-size: 0.85rem; }
        .option-item input { margin-right: 12px; accent-color: var(--rh-red); width: 16px; height: 16px; }
        .title-display { background: var(--rh-black); color: white; padding: 40px; border-left: 10px solid var(--rh-red); margin-top: 20px; }
        .highlight-label { color: var(--rh-red); font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 10px; }
        .highest-title-text { font-size: 2.5rem; font-weight: 700; font-family: 'Red Hat Display'; margin-bottom: 40px; }
        .title-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px 60px; }
        .title-entry { display: flex; align-items: baseline; gap: 20px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .acronym { font-weight: 700; color: var(--rh-red); min-width: 90px; font-size: 1rem; }
        .full-name { font-weight: 400; color: #fff; font-size: 1rem; }
    </style>
</head>
<body>

<div class="hero-banner">
    <div class="hero-text">
        <h1>Hey, Curious Learner!</h1>
        <p>Explore your credentials under the new Red Hat Certification Framework mapping.</p>
    </div>
</div>

<div class="main-content">
    <h1 style="font-family: 'Red Hat Display'; font-size: 1.2rem; text-transform: uppercase; margin-bottom: 20px;">Title Simulator</h1>
    <div class="container">
        <div class="column">
            <h2>Specialization</h2>
            <label class="option-item"><input type="radio" name="spec" value="linux" checked onclick="calculate()"> Enterprise Linux</label>
            <label class="option-item"><input type="radio" name="spec" value="ansible" onclick="calculate()"> Ansible</label>
        </div>
        <div class="column">
            <h2>Select Your Exams</h2>
            <label class="option-item"><input type="checkbox" id="ex200" onclick="calculate()"> EX200 (RHCSA)</label>
            <label class="option-item"><input type="checkbox" id="ex294" onclick="calculate()"> EX294 (Ansible Automation)</label>
            <label class="option-item"><input type="checkbox" id="ex188" onclick="calculate()"> EX188 (Containers)</label>
        </div>
    </div>

    <div class="title-display">
        <div class="highlight-label">Highest Achievement</div>
        <div id="highest-title" class="highest-title-text">Candidate</div>
        <div style="border-top: 1px solid #333; padding-top: 20px;">
            <h4 style="font-size: 0.7rem; text-transform: uppercase; color: #888; margin-bottom: 15px;">Primary Titles</h4>
            <div id="primary-list" class="title-grid"></div>
        </div>
    </div>
</div>

<script>
    function calculate() {
        const spec = document.querySelector('input[name="spec"]:checked').value;
        const has200 = document.getElementById('ex200').checked;
        const has294 = document.getElementById('ex294').checked;
        const has188 = document.getElementById('ex188').checked;
        
        let titles = [];
        let highest = "Candidate";

        if (has200) {
            titles.push({acr: "RHCSA", full: "Red Hat Certified System Administrator"});
            highest = "Red Hat Certified System Administrator";
        }

        if (has188) {
            titles.push({acr: "RHCD", full: "Red Hat Certified Developer in Cloud-native Applications"});
            highest = "Red Hat Certified Developer in Cloud-native Applications";
        }

        if (has294) {
            // Standalone title for EX294
            titles.push({acr: "Adv. Admin", full: "Red Hat Certified Advanced System Administrator in Ansible Automation Platform"});
            highest = "Red Hat Certified Advanced System Administrator in Ansible Automation Platform";
        }

        // Meta-certifications for EX200 + EX294 combo
        if (has200 && has294) {
            titles.push({acr: "RHCE", full: "Red Hat Certified Engineer in Ansible Automation Platform"});
            titles.push({acr: "RHCE", full: "Red Hat Certified Engineer in Enterprise Linux"});
            highest = "Red Hat Certified Engineer (Dual Track)";
        }

        document.getElementById('highest-title').innerText = highest;
        document.getElementById('primary-list').innerHTML = titles.map(t => `
            <div class="title-entry">
                <span class="acronym">${t.acr}</span>
                <span class="full-name">${t.full}</span>
            </div>
        `).join('');
    }
    calculate();
</script>
</body>
</html>
